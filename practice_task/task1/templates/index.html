<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% if student %}
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        {% for i in student %}
        <tr>
            <td>{{ i["name"] }}</td>
            <td>{{ i["age"] }}</td>
        </tr>
        {% endfor%}
    </table>
    {%else%}
    <h4> no data found </h4>
    {%endif%}
    
</body>
</html>
